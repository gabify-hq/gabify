  version: 2.0.0
  contact:
    name: InvoiceXpress API Support
    email: support@invoicexpress.com
  x-logo:
    url: ../images/ix-logo.svg
    altText: InvoiceXpress Logo
servers:
  - url: https://{account_name}.app.invoicexpress.com
    description: Production Server
    variables:
      account_name:
        default: your-account
        description: Your account subdomain.
tags:
  - name: Accounts
    description: Create, update and get info about your account.
  - name: Invoices
    description: >-
      Create invoices, invoice receipts, simplified invoices, vat moss invoices,
      credit notes & debit notes and send them to your clients.
  - name: Estimates
    description: Create quotes, proformas or fees notes and send them to your clients.
  - name: Guides
    description: Create shippings, transports & devolutions and send them to your clients.
  - name: Sequences
    description: A Sequence is used to group invoices in a sequential order.
  - name: Taxes
    description: A Tax is applied to invoice items when creating invoices.
  - name: SAF-T
    description: >-
      Export the Standard Audit File for Tax (SAF-T PT) required by the
      Portuguese Tax Authority.
  - name: Clients
    description: A Client is an entity you send invoices to.
  - name: Items
    description: An Item is the product or service you invoice.
  - name: Treasury
    description: Section dedicated to treasury movements.
security:
  - apiKeyAuth: []
paths:
  /api/accounts/create.json:
    post:
      summary: Create Account
      operationId: createAccount
      tags:
        - Accounts
      parameters:
        - $ref: '#/components/parameters/ApiKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreateRequest'
      responses:
        '201':
          description: SUCCESS
          content:
            application/json:
              schema:
