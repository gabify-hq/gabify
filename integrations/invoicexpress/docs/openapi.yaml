  /{invoices-type}.json:
    post:
      summary: Create Invoice
      operationId: createInvoice
      tags:
        - Invoices
      description: >
        Creates a new invoice, simplified_invoice, invoice_receipt, credit_note
        or debit_note.




        ### Creating new clients or items along with the documents

        This method also allows to create a new client and/or new items in the
        same request with the following behavior:

        * If the client name does not exist, a new one is created.

        * If items do not exist with the given names, new ones will be created.

        * If item name already exists, the item is updated with the new values.


        ### Taxes

        Regarding item taxes, if the tax name is not found, the default tax is
        applyed to that item. Portuguese accounts should also send the IVA
        exemption reason if the invoice contains exempt items (IVA 0%).


        > **Note:** Simplified Invoices are only available in Portugal.
      parameters:
        - $ref: '#/components/parameters/ApiKeyParam'
        - $ref: '#/components/parameters/DocumentTypeInvoiceParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceCreateRequest'
      responses:
        '201':
          description: >
            SUCCESS 


            Creates a new quote, proforma or fees_note.


            #### Possible values for field atcud:


            * ABCD1234-1 (or similar) - Unique document identifier to the Tax
            Authority, when the sequence is registered.

            * N/D - The document's sequence is relevant for ATCUD but is not
            registered in the Tax Authority.

            * N/A - The document's sequence is not relevant for ATCUD and is not
            registered in the Tax Authority.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceGetResponse'
        '401':
          description: ACCESS DENIED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401'
        '409':
          description: CONFLICT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/409CreateInvoice'
        '422':
          description: UNPROCESSABLE ENTITY
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422CreateInvoice'
      x-codeSamples:
        - lang: curl
          label: cURL
          source: >-
            curl -X POST
            "https://your-account.app.invoicexpress.com/1.json?api_key=YOUR_API_KEY"
            \
