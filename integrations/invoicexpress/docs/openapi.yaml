info:
  title: InvoiceXpress API
  description: >+
    Endpoints for managing Accounts, Invoices, Estimates, and organization data
    in InvoiceXpress. <br><h2>Welcome to our API in JSON</h2> Hello there!
    Welcome to the world of InvoiceXpress API! This world is inhabitated by
    creatures we call Endpoints.<p><p> People and Endpoints live together by
    supporting each other. Some people play with Endpoints, some work with
    them.<p> If you’re reading this, let me guess, you need to issue invoices
    but don’t want to lose focus from building a great solution and writing
    amazing code.<p> Did we cover your scenario? Ok, great. Let’s do this.<p>
    <h3>Quick Start</h3> <ol><li>[Sign up FREE for 30
    days](https://web.invoicexpress.com/signup)</li><li>[Get your API
    key](https://web.invoicexpress.com/users/api_key)</li><li>[Create an
    Invoice](#tag/Invoices)</li></ol>

    ## Documentation


    Reference tables for Portuguese VAT (IVA) exemptions, payment mechanism
    codes used for partial payments, and accepted countries when creating a
    client or an account.


    <details>

    <summary>Authentication</summary>



    In order to authenticate a user through our API, an API key must be used.
    All API endpoints are available via HTTPS. HTTP access is denied. Each API
    key authenticates a user inside an account, and it's composed by arbitrary
    characters.


    This key must be passed on the query string in each HTTPS request to
    authenticate the user. Although all endpoints are accessed through HTTPS,
    please keep this token as secure as possible in order to avoid third party's
    to access your InvoiceXpress data.


    We strongly recommend you re-generate your API Key from time to time.


    **Example:**


    `https://ACCOUNT_NAME.app.invoicexpress.com/invoices.json?api_key=API_KEY`


    You can find your ACCOUNT_NAME and API_KEY here:
    [https://www.app.invoicexpress.com/users/api](https://www.app.invoicexpress.com/users/api)


    On POST and PUT requests do not forget to specify on the Header:


    `Content-Type: application/json`



    </details>


    <details>

    <summary>IVA exemption codes</summary>



    | Code | Description on the Invoice | Where does it apply? |

    | --- | --- | --- |

    | M01 | Artigo 16.°, n.° 6 do CIVA | Artigo 16.°, n.° 6, alíneas a) a d) do
    CIVA |

    | M02 | Artigo 6.° do Decreto-Lei n.° 198/90, de 19 de junho | Artigo 6.° do
    Decreto-Lei n.° 198/90, de 19 de junho |

    | M04 | Isento artigo 13.° do CIVA | Artigo 13.° do CIVA |

    | M05 | Isento artigo 14.° do CIVA | Artigo 14.° do CIVA |

    | M06 | Isento artigo 15.° do CIVA | Artigo 15.° do CIVA |

    | M07 | Isento artigo 9.° do CIVA | Artigo 9.° do CIVA |

    | M09 | IVA – não confere direito a dedução | Artigo 62.° alínea b) do CIVA
    |

    | M10 | IVA – regime de isenção | Artigo 57.° do CIVA |

    | M11 | Regime particular do tabaco | Decreto-Lei n.° 346/85, de 23 de
    agosto |

    | M12 | Regime da margem de lucro – Agências de viagens | Decreto-Lei n.°
    221/85, de 3 de julho |

    | M13 | Regime da margem de lucro – Bens em segunda mão | Decreto-Lei n.°
    199/96, de 18 de outubro |

    | M14 | Regime da margem de lucro – Objetos de arte | Decreto-Lei n.°
    199/96, de 18 de outubro |

    | M15 | Regime da margem de lucro – Objetos de coleção e antiguidades |
    Decreto-Lei n.° 199/96, de 18 de outubro |

    | M16 | Isento artigo 14.° do RITI | Artigo 14.° do RITI |

    | M19 | Outras isenções | Isenções temporárias determinadas em diploma
    próprio |

    | M20 | IVA – regime forfetário | Artigo 59.°-D n.°2 do CIVA |

    | M21 | IVA – não confere direito à dedução (ou expressão similar) | Artigo
    72.° n.° 4 do CIVA |

    | M25 | Mercadorias à consignação | Artigo 38.° n.° 1 alínea a) |

    | M30 | IVA – autoliquidação | Artigo 2.° n.° 1 alínea i) do CIVA |

    | M31 | IVA – autoliquidação | Artigo 2.° n.° 1 alínea j) do CIVA |

    | M32 | IVA – autoliquidação | Artigo 2.° n.° 1 alínea I) do CIVA |

    | M33 | IVA – autoliquidação | Artigo 2.° n.° 1 alínea m) do CIVA |

    | M40 | IVA – autoliquidação | Artigo 6.° n.° 6 alínea a) do CIVA, a
    contrário |

    | M41 | IVA – autoliquidação | Artigo 8.° n.° 3 do RITI |

    | M42 | IVA – autoliquidação | Decreto-Lei n.° 21/2007, de 29 de janeiro |

    | M43 | IVA – autoliquidação | Decreto-Lei n.° 362/99, de 16 de setembro |

    | M44 | IVA - Regras específicas - artigo 6.º | Artigo 6.º do CIVA – Regras
    específicas. A utilizar nas operações que não sejam localizadas em Portugal
    por força das regras de exceção constantes dos números 7 e seguintes do
    artigo 6.º do Código do IVA |

    | M45 | IVA - Regime transfronteiriço de isenção | Artigo 58.º-A do CIVA. A
    utilizar nas operações localizadas noutro Estado Membro da União Europeia e
    que ali fiquem isentas de IVA, em virtude de o transmitente dos bens ou
    prestador dos serviços ter aderido ao Regime Transfronteiriço de isenção
    relativamente às operações que realize nesse Estado Membro. Sem prejuízo do
    disposto no Ofício-Circulado n.º 25 065, de 08/04/2025, por uma questão de
    melhor identificação e separação destas operações, deve ser utilizada a
    menção "IVA – regime transfronteiriço de isenção". |

    | M46 | IVA - e-TaxFree | Decreto-lei n.º 19/2017, de 14 de fevereiro. A
    utilizar pelo vendedor na emissão de faturas relativas a operações em que
    tenha aplicado a isenção na transmissão de bens a serem transportados na
    bagagem pessoal de viajantes sem domicílio ou estabelecimento na União
    Europeia, nos termos do referido decreto-lei. |

    | M99 | Não sujeito ou não tributado | Outras situações de não liquidação do
    imposto (Exemplos: artigo 2.°, n.° 2 ; artigo 3.°, n.°s 4, 6 e 7; artigo
    4.°, n.° 5, todos do CIVA) |



    </details>


    <details>

    <summary>Payment mechanisms</summary>



    This list shows the possible values for the payment mechanism when doing a
    partial payment:


    - **CC**: Credit card

    - **CD**: Debit card

    - **CH**: Bank check

    - **CO**: Check or voucher

    - **CS**: Current account balance compensation

    - **DE**: e-Cash

    - **LC**: Commercial paper

    - **MB**: Multibanco payment references

    - **NU**: Cash

    - **OU**: Other methods not mentioned here

    - **PR**: Exchange of properties

    - **TB**: Bank transfer or authorized direct debit

    - **TR**: Restaurant ticket



    </details>


